name: Release Plugins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Plugins (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
        plugin:
          - name: hacker-news
            dir: hacker-news
            binary: hacker-news-mcp
          - name: oido-postgres
            dir: oido-postgres
            binary: oido-postgres-mcp
        exclude:
          # Cross-compile arm64 on ubuntu via CGO disabled
          - os: ubuntu-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build ${{ matrix.plugin.name }}
        working-directory: ${{ matrix.plugin.dir }}
        env:
          GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -o ${{ matrix.plugin.binary }} .
          chmod +x ${{ matrix.plugin.binary }}

      - name: Package ${{ matrix.plugin.name }}
        working-directory: ${{ matrix.plugin.dir }}
        env:
          GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}
          GOARCH: ${{ matrix.arch }}
          PLUGIN_NAME: ${{ matrix.plugin.name }}
          BINARY: ${{ matrix.plugin.binary }}
        run: |
          mkdir -p dist
          ZIP_NAME="${PLUGIN_NAME}-${GOOS}-${GOARCH}.zip"
          cp plugin.json qwen-extension.json QWEN.md dist/
          cp $BINARY dist/
          mkdir -p dist/commands dist/skills/$PLUGIN_NAME
          cp -r commands/* dist/commands/ 2>/dev/null || true
          cp -r skills/$PLUGIN_NAME/* dist/skills/$PLUGIN_NAME/ 2>/dev/null || true
          cd dist && zip -r ../$ZIP_NAME . && cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.name }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}-${{ matrix.arch }}
          path: ${{ matrix.plugin.dir }}/${{ env.ZIP_NAME }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*.zip
